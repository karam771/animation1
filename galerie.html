<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galerie - Antalya Pizzeria & Imbiss Barnstorf</title>
    <link rel="stylesheet" href="style.css?v=1.0.4" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        .gallery-page { padding: 8rem 0 4rem; min-height: 100vh; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }
        .gallery-item {
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fg-50);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <nav class="nav scrolled">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="Antalya Logo" class="nav-logo-img" />
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="speisekarte.html" class="nav-link">Speisekarte</a>
                <a href="bewertungen.html" class="nav-link">Bewertungen</a>
                <a href="kontakt.html" class="nav-link">Anfahrt</a>
                <a href="tel:054428045815" class="nav-link-cta">Jetzt anrufen</a>
            </div>
        </div>
    </nav>

    <main class="gallery-page">
        <div class="container-lg">
            <h1 class="heading-serif-lg">Unsere <em>Galerie</em></h1>
            <p class="text-body">Hier findest du bald Eindrücke aus unserem Restaurant und von unseren Gerichten.</p>
            
            <div class="gallery-grid">
                <div class="gallery-item">Platzhalter 1</div>
                <div class="gallery-item">Platzhalter 2</div>
                <div class="gallery-item">Platzhalter 3</div>
                <div class="gallery-item">Platzhalter 4</div>
                <div class="gallery-item">Platzhalter 5</div>
                <div class="gallery-item">Platzhalter 6</div>
            </div>
            
            <div style="margin-top: 4rem; text-align: center;">
                <a href="index.html" class="btn btn-outline">Zurück zur Startseite</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Pizzeria Antalya Barnstorf</p>
    </footer>
</body>
</html>
